baseurl      = "https://jaechoidev.github.io/"
title        = "Dev Note"
languageCode = "en-us"
theme        = "hello-friend-ng"
paginate     = 10
publishDir = "docs"

disableHugoGeneratorInject = true
enableEmoji = true
footnoteReturnLinkContents = "↩"
hasCJKLanguage = true
googleAnalytics = "UA-123-45"

# disableKinds = ["taxonomy", "taxonomyTerm", "RSS", "sitemap", "robotsTXT"]


[params]
  dateform        = "Jan 2, 2006"
  dateformShort   = "Jan 2"
  dateformNum     = "2006-01-02"
  dateformNumTime = "2006-01-02 15:04"
  

  # Subtitle for home
  homeSubtitle = "Lighting TD / (Aspiring) Graphics Engineer"

  # Set disableReadOtherPosts to true in order to hide the links to other posts.
  disableReadOtherPosts = false

  # Enable sharing buttons, if you like
  enableSharingButtons = false

  # Metadata mostly used in document's head
  description = "dev notes"
  keywords = "CG, Lighting, Render, blog"
  images = [""]

  [[params.social]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/jaechoidev/"
    weight = 10

  [[params.social]]
    name = "twitter"
    url = "https://www.twitter.com/jaechoidev/"
    weight = 20

  [[params.social]]
    name = "instagram"
    url = "https://www.instagram.com/jaechoi.dev/"
    weight = 30

[taxonomies]
    category = "categories"
    tag      = "tags"
    series   = "series"

[languages]
  [languages.en]
    title = "Hello, I'm Jae"
    subtitle = "Lighting TD / (Aspiring) Graphics Engineer"
    keywords = ""
    copyright = '<a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener">CC BY-NC 4.0</a>'
    readOtherPosts = "Read other posts"

    [languages.en.params.logo]
      logoText = "./index.html"
      logoHomeLink = "/"
    # or
    #
    # path = "/img/your-example-logo.svg"
    # alt = "Your example logo alt text"

  # And you can even create generic menu
  [menu]
    [[menu.main]]
      identifier = "about"
      name       = "About"
      url        = "/about"
    [[menu.main]]
      identifier = "projects"
      name       = "Projects"
      url        = "/projects"
    [[menu.main]]
      identifier = "dailies"
      name       = "Dailies"
      url        = "/dailies"
    
